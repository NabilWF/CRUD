<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD</title>

    <link rel="stylesheet" href="/css/all.min.css" />
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body>
    <!-- main div -->
    <div class="main w-50 mx-auto py-5">
      <h1 class="text-center">Store Mangment System</h1>

      <!-- inputs -->
      <div class="inputs p-4">
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="productName"
            placeholder=""
          />
          <label for="productName">Product Name :</label>
        </div>

        <div class="form-floating mb-3">
          <input
            type="number"
            class="form-control"
            id="productPrice"
            placeholder=""
          />
          <label for="productPrice">Product Price :</label>
        </div>

        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="productCategory"
            placeholder=""
          />
          <label for="productCategory">Product Category :</label>
        </div>

        <div class="mb-3">
          <label for="productDesc">Product Description :</label>
          <textarea
            type="text"
            class="form-control"
            rows="4"
            id="productDesc"
            placeholder=""
          ></textarea>
        </div>

        <div class="mb-3">
          <label for="productImage">Product Image :</label>
          <input
            type="file"
            class="form-control"
            id="productImage"
            placeholder=""
          />
        </div>

        <!-- Add Button -->
        <button id="addBtn" onclick="addProduct()" class="btn btn-primary">
          Add Product
        </button>

        <!-- Update Button -->
        <button
          id="updateBtn"
          onclick="updateNewData()"
          class="btn btn-warning d-none"
        >
          Update Product
        </button>

        <div class="w-50 mx-auto p-4">
          <input
            oninput="search()"
            id="searchInput"
            placeholder="Search By Name"
            type="text"
            class="form-control"
          />
        </div>
      </div>
    </div>
    <section class="py-5">
      <div class="w-75 mx-auto">
        <div id="rowData" class="row g-4"></div>
      </div>
    </section>
    <script src="/js/main.js"></script>
  </body>
</html>
